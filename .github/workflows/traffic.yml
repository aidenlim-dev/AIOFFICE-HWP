name: Refresh traffic data

on:
  schedule:
    # Daily at 00:00 UTC (≈ 09:00 KST). GitHub Traffic API retains 14 days
    # of data, so a daily cron captures the rolling window without gaps.
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/traffic.yml'

permissions:
  contents: write   # commit refreshed JSON back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch traffic + write shields.io endpoint JSON
        env:
          # Traffic API requires the repo `Administration: Read` scope,
          # which the default GITHUB_TOKEN can NOT carry (it's admin-only).
          # Set a fine-grained PAT as a repo secret named TRAFFIC_PAT —
          # scoped to only this repo with `Administration: Read` (and
          # `Contents: Read` so checkout works) — and the API call below
          # gets the access it needs. Without the secret the gh call
          # falls back to GITHUB_TOKEN and fails with 403.
          GH_TOKEN: ${{ secrets.TRAFFIC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .github
          clones=$(gh api "repos/${{ github.repository }}/traffic/clones" --jq '.count')
          cat > .github/traffic-summary.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Clones (14d)",
            "message": "${clones}",
            "color": "blue",
            "namedLogo": "git"
          }
          EOF

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/traffic-summary.json
          if git diff --cached --quiet; then
            echo "no traffic changes"
          else
            git commit -m "chore: refresh traffic data [skip ci]"
            git push
          fi
